<article
  class="group flex h-full cursor-pointer flex-col rounded-2xl border border-slate-800/80 bg-slate-900/40 p-5 shadow-sm shadow-slate-950/60 transition hover:-translate-y-1 hover:border-emerald-500/70 hover:shadow-[0_18px_45px_rgba(16,185,129,0.35)]"
  (click)="open.emit(project)"
>
  <div *ngIf="project.thumbnail || project.thumbnailPlaceholder" class="relative mb-3 overflow-hidden rounded-xl">
    <img
      *ngIf="project.thumbnail"
      [src]="project.thumbnail"
      [attr.srcset]="project.thumbnail2x ? project.thumbnail + ' 1x, ' + project.thumbnail2x + ' 2x' : undefined"
      loading="lazy"
      decoding="async"
      [alt]="displayTitle"
      class="h-44 w-full object-cover object-top"
    />
    <div
      *ngIf="project.thumbnailPlaceholder"
      class="flex h-44 w-full flex-col items-center justify-center gap-2 bg-slate-800/60"
      [attr.aria-label]="'projects.privateThumbnail' | translate"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-slate-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
      </svg>
      <span class="text-center text-xs text-slate-400">{{ 'projects.privateThumbnail' | translate }}</span>
    </div>
    <div
      class="absolute inset-x-0 bottom-0 flex items-center justify-center gap-2 bg-gradient-to-t from-slate-950/90 to-transparent px-3 py-3"
    >
      <a
        *ngIf="project.liveDemoUrl"
        [href]="project.liveDemoUrl"
        target="_blank"
        rel="noreferrer"
        class="inline-flex items-center gap-1.5 rounded-full bg-emerald-500 px-3.5 py-1.5 text-sm font-medium text-slate-950 shadow-[0_0_20px_rgba(16,185,129,0.5)] transition hover:bg-emerald-400"
        (click)="$event.stopPropagation()"
      >
        <span>Live demo</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6-6M13 18l6-6" />
        </svg>
      </a>
      <a
        *ngIf="project.githubUrl"
        [href]="project.githubUrl"
        target="_blank"
        rel="noreferrer"
        class="inline-flex items-center gap-1.5 rounded-full bg-slate-700/90 px-3.5 py-1.5 text-sm font-medium text-slate-100 transition hover:bg-slate-600"
        (click)="$event.stopPropagation()"
      >
        <span>GitHub</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6" />
        </svg>
      </a>
    </div>
  </div>

  <div class="mb-2 flex items-center justify-between gap-2">
    <h3 class="text-sm font-semibold text-slate-50">
      {{ displayTitle }}
    </h3>
    <span class="rounded-full bg-slate-800/80 px-2.5 py-0.5 text-[11px] text-slate-300">
      {{ project.techStack[0] }}
    </span>
  </div>

  <p class="mb-3 flex-1 text-xs text-slate-300">
    {{ displayShortDescription }}
  </p>

  <!-- bez thumbnaila: linki tutaj -->
  <div *ngIf="!project.thumbnail" class="mb-3 flex flex-wrap items-center gap-2">
    <a
      *ngIf="project.liveDemoUrl"
      [href]="project.liveDemoUrl"
      target="_blank"
      rel="noreferrer"
      class="inline-flex items-center gap-1 rounded-full bg-emerald-500/10 px-3 py-1 text-emerald-300 transition hover:bg-emerald-500/20"
      (click)="$event.stopPropagation()"
    >
      <span>Live demo</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6-6M13 18l6-6" />
      </svg>
    </a>
    <a
      *ngIf="project.githubUrl"
      [href]="project.githubUrl"
      target="_blank"
      rel="noreferrer"
      class="inline-flex items-center gap-1 text-slate-300 transition hover:text-emerald-300"
      (click)="$event.stopPropagation()"
    >
      <span>GitHub</span>
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6" />
      </svg>
    </a>
    <span *ngIf="!project.githubUrl && !project.liveDemoUrl" class="text-xs text-slate-500">
      {{ 'projects.privateApp' | translate }}
    </span>
  </div>

  <div class="mt-auto flex flex-wrap gap-1.5 text-[11px]">
    <span
      *ngFor="let tech of project.techStack | slice : 0 : 4"
      class="rounded-full bg-slate-800/80 px-2.5 py-0.5 text-slate-200"
    >
      {{ tech }}
    </span>
    <span
      *ngIf="project.techStack.length > 4"
      [title]="'projects.moreTechnologiesList' | translate: { count: project.techStack.length - 4, list: project.techStack.slice(4).join(', ') }"
      class="cursor-help rounded-full bg-slate-800/80 px-2.5 py-0.5 text-slate-400"
    >
      +{{ project.techStack.length - 4 }}
    </span>
  </div>
</article>
